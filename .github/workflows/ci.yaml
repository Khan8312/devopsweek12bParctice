name: ci-workflows
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
jobs: 
  linting-job:
    runs-on: ubuntu-latest
    steps:
      - name: welcome message
        run:  echo "welcome to c pipeline"
      - name: checkout or clone the  repository 
        uses:  actions/checkout@v4
      - name: intsalling HTML hinter
        run: npm install --save-dev htmlhint
      - name: run htnl hinter
        run: npx htmlhint "**/*.html"
        
        

